version: '3.8'
services:
  db:
    image: postgres:16
    container_name: sahaya-db
    restart: always
    environment:
      POSTGRES_DB: sahayasetu
      POSTGRES_USER: sahaya
      POSTGRES_PASSWORD: sahaya123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: